name: Build & deploy matchup site

on:
  # Build + deploy when the workflow lands on the default branch (e.g. on
  # merge), so the site goes live without waiting for the first cron.
  push:
    branches: [main]
  # Manual trigger (lets you rebuild on demand from the Actions tab).
  workflow_dispatch:
  # GitHub cron cannot be rewritten from the day's MLB slate. Instead, a cheap
  # poll runs off the top of the hour and schedule_gate.py starts the full build
  # only when a game is 15-90 minutes from first pitch. The wide window rides
  # out Actions queue delay (runs regularly start 5-20+ min late); pending-row
  # refresh means the lock is the last pregame snapshot regardless. A separate
  # early-morning pass grades the prior slate. Timezone-aware entries avoid DST
  # drift; push/manual events always build immediately.
  schedule:
    - cron: '17 4 * * *'
      timezone: America/New_York
    - cron: '7,22,37,52 10-23 * * *'
      timezone: America/New_York

# Serialize whole workflow runs: exactly one build/deploy at a time, queued
# not cancelled, so overlapping crons can't interleave ledger commits.
concurrency:
  group: site-build
  cancel-in-progress: false

permissions:
  contents: write          # commit the grading ledger (data/) back to the repo
  pages: write
  id-token: write

jobs:
  plan:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      should_run: ${{ steps.gate.outputs.should_run }}
      slate_date: ${{ steps.gate.outputs.slate_date }}
      reason: ${{ steps.gate.outputs.reason }}
    steps:
      - uses: actions/checkout@v4
      - name: Gate scheduled build against today's first pitches
        id: gate
        env:
          EVENT_NAME: ${{ github.event_name }}
          EVENT_SCHEDULE: ${{ github.event.schedule }}
        run: python schedule_gate.py

  build:
    needs: plan
    if: needs.plan.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15        # fail fast if an upstream API hangs
    env:
      # MODEL_TAG records row lineage. On any prediction-math change, bump it
      # and start a new RECORD_TAGS family so incompatible results and weight
      # fits never mix. Audit-only tags may remain in one family. Job-level so
      # grade_leans.py and build_site.py see the same configuration.
      # v5 adds empirical-Bayes xwOBA shrinkage (each hitter and the starter are
      # regressed toward the league xwOBA baseline by sample size) on top of v4's
      # slot-PA weighting. Another prediction-math change, so it starts a fresh
      # record family; v5 games never mix with v4 or the v2/v3 season-volume
      # results in the headline records or the weight fit.
      MODEL_TAG: xw+plat_consol_v5
      RECORD_TAGS: xw+plat_consol_v5
    steps:
      - uses: actions/checkout@v4

      # Enables Pages on first run (using the pages:write permission above) and
      # exposes the publish settings, so no manual Settings -> Pages toggle is
      # needed. No-op once Pages is already enabled.
      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      # Reproduce the notebook's once/day Savant leaderboard cache. The cache is
      # keyed to the ET slate date so a given day's CSVs are pulled once and
      # reused across that day's runs; a new day misses and re-pulls.
      - name: Restore Savant leaderboard cache
        uses: actions/cache@v4
        with:
          path: .savant_cache
          key: savant-${{ needs.plan.outputs.slate_date }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Grade BEFORE the build: ingest any committed lean dumps and grade
      # pending games via StatsAPI linescores, so the records strip and
      # grades.html the build renders reflect last night's results in the
      # same run. The ~4:17am ET run is the one that grades yesterday.
      - name: Grade leans (pre-build)
        run: python grade_leans.py

      # Pythagorean CONTROL arm — runs BEFORE the build so the daily slate CSV it
      # emits is on disk when build_site.py renders the cards (each card shows the
      # control's home win% beside the market implied %). It also merges a
      # no-lookahead, market-free win probability (season-to-date runs
      # scored/allowed, Log5, explicit league home-field term) into the ledger
      # under its own PYTHAG_TAG-versioned columns, and writes an evaluation
      # report. It is a benchmark for the xwOBA/platoon leans, never a lean
      # itself, so continue-on-error keeps a control hiccup from ever blocking
      # the build/grade/deploy path — build_site treats a missing slate as
      # em-dashes, exactly like an odds outage.
      - name: Pythagorean control (merge + slate + report)
        continue-on-error: true
        env:
          PYTHAG_TAG: pythag_v1
          SLATE_DATE: ${{ needs.plan.outputs.slate_date }}
        run: |
          python pythag_control.py --season 2026 \
            --ledger data/mlb_lean_ledger.csv --merge-ledger \
            --slate-date "$SLATE_DATE" --report

      # Build into ./public. On a hard fetch failure the script exits non-zero
      # WITHOUT writing index.html, so the steps below don't run, the artifact
      # is never uploaded, the deploy job is skipped, and the last good page
      # stays live. A legitimately empty slate writes a friendly page instead.
      - name: Build static site
        env:
          SLATE_DATE: ${{ needs.plan.outputs.slate_date }}
          CACHE_DIR: .savant_cache
          OUT_DIR: public
        run: python build_site.py

      # Second grading pass ingests the dumps the build just wrote (new
      # games + pending-row refresh for SP scratches). Idempotent; graded
      # rows are never touched.
      - name: Grade leans (post-build)
        run: python grade_leans.py

      # build_site.py initially renders grades.html before fetching the slate.
      # Re-render after post-build ingestion so the deployed table and pending
      # count include every matchup produced by this exact build.
      - name: Refresh grades page from final ledger
        run: python build_site.py --grades-only

      # The ledger persists by being committed. Pushes made with the default
      # GITHUB_TOKEN don't retrigger this workflow, so no recursion. The
      # rebase absorbs any commit that landed on main mid-run. Stage data/
      # BEFORE the rebase: untracked lean CSVs would otherwise abort the
      # rebase when a mid-run commit already carries the same files, and a
      # failed commit loses this build's snapshots (stale locks). Autostash
      # re-applies the stash unstaged, so re-add after the pull too.
      - name: Commit ledger
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git pull --rebase --autostash origin main
          git add data/
          git diff --cached --quiet || git commit -m "ledger $(date -u +%FT%H:%MZ)"
          git push

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
